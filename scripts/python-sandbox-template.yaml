# SandboxTemplate the harness's AgentSandboxBackend instantiates by default.
# Apply with: kubectl apply -n default -f scripts/python-sandbox-template.yaml
#
# Image: a slim official Python that has python3 on PATH. The agent-sandbox
# controller bolts its server side into the pod automatically — the template
# only specifies the container image and resource limits.
#
# Fields are deliberately conservative — small CPU/memory request and limit,
# no networking egress restrictions (the harness's run_python is for data
# manipulation, not network calls; tighten via NetworkPolicy if you want).
#
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python
spec:
  podTemplate:
    spec:
      containers:
        - name: sandbox
          image: python:3.11-slim
          command: ["sleep", "infinity"]  # the controller exec()s into here
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
